services:
  ohca-dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDCAP_URL=${REDCAP_URL:-https://redcap.ntuh.gov.tw/api/}
      - REDCAP_TOKEN=${REDCAP_TOKEN}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SCREENING_API_TOKEN=${SCREENING_API_TOKEN}
    restart: unless-stopped
