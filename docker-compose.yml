services:
  ohca-dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDCAP_URL=${REDCAP_URL:-https://redcap.ntuh.gov.tw/api/}
      - REDCAP_TOKEN=${REDCAP_TOKEN}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PYTHON_PATH=${PYTHON_PATH:-python3}
      - NTUH_HSINCHU_USERNAME=${NTUH_HSINCHU_USERNAME}
      - NTUH_HSINCHU_PASSWORD=${NTUH_HSINCHU_PASSWORD}
      - NTUH_MAIN_USERNAME=${NTUH_MAIN_USERNAME}
      - NTUH_MAIN_PASSWORD=${NTUH_MAIN_PASSWORD}
      - NTUH_BIO_USERNAME=${NTUH_BIO_USERNAME}
      - NTUH_BIO_PASSWORD=${NTUH_BIO_PASSWORD}
      - NTUH_YUNLIN_USERNAME=${NTUH_YUNLIN_USERNAME}
      - NTUH_YUNLIN_PASSWORD=${NTUH_YUNLIN_PASSWORD}
    restart: unless-stopped
